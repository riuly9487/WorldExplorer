<!DOCTYPE html>
<html>
    <head>
        <title>
            WorldExplorer
        </title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="css/body.css">
        <link rel="stylesheet" href="css/quiznowlayout.css">
        <link rel="stylesheet" href="css/result.css">
        <link rel="stylesheet" href="css/layout.css">
        <link rel="stylesheet" href="css/button.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Zalando+Sans:ital,wght@0,200..900;1,200..900&display=swap" rel="stylesheet">
        <audio class="audio-pass">
            <source src="https://res.cloudinary.com/dyghlzxwz/video/upload/q_auto/f_auto/v1775018442/pass_k1gez7.wav" type="audio/wav">
        </audio>
        <audio class="audio-fail">
            <source src="https://res.cloudinary.com/dyghlzxwz/video/upload/q_auto/f_auto/v1775018440/fail_xw5xio.wav" type="audio/wav">
        </audio>
    </head>
    <body>
        <div class="quiznow-result">
            <div class="title">
                Quiznow Difficulty:
            </div>
            <div class="difficulty">
            </div>
            <div class="title">
                Progression:
            </div>
            <div class="progression-indicator">
            </div>
            <div class="title">
                Results:
            </div>
            <div class="result-display">
            </div>
            <div class="title">
                EXP Received:
            </div>
            <div class="exp-obtained">
            </div>
            <div class="title">
                Final EXP Received:
            </div>
            <div class="final-exp-obtained">
            </div>
            <div class="title">
                Profile Progression:
            </div>
            <div class="profile-progression">
            </div>
        </div>
        <div class="navigation-section">
            <div>
                <button class="btn-return-to-quiznow">
                    Return
                </button>
            </div>
            <div>
                <button class="btn-play-again">
                    Play Again
                </button>
            </div>
        </div>
        <script type="module" src="../js/button.js"></script>
        <script type="module" src="../js/generateResult.js"></script>
    </body>
</html>
